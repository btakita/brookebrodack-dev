name = "brookebrodack-websub"
main = "index.ts"
compatibility_date = "2024-12-01"

[vars]
GH_OWNER = "btakita"
GH_REPO = "brookebrodack-dev"
GH_WORKFLOW = "deploy.yml"

# Secrets (set via `wrangler secret put`):
