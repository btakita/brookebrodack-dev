name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      trigger:
        description: 'What triggered this build (e.g., websub, manual)'
        required: false
        default: 'manual'
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours for YouTube data freshness

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      # Replace local yalc paths with npm versions for CI
      - name: Resolve yalc dependencies to npm
        run: |
          sed -i 's|"file:\.yalc/@rappstack/[^"]*"|"^0.1.0"|g' package.json
          rm -f bun.lock

      - run: bun install --ignore-scripts

      # Download assets from Contabo S3 (gitignored, needed at build time)
      - name: Download assets
        run: |
          pip install awscli --quiet
          mkdir -p public/assets
          aws s3 cp s3://$AWS_BUCKET/ public/assets --recursive --endpoint-url $AWS_ENDPOINT_URL
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}

      # Run database migrations to initialize schema
      - name: Initialize database
        run: cd app/brookebrodack-site && bun db/migrate.ts
        env:
          NODE_ENV: production
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_CHANNELID: ${{ secrets.YOUTUBE_CHANNELID }}
          YOUTUBE_RSS_URL: ${{ secrets.YOUTUBE_RSS_URL }}

      # Generate blog posts for new YouTube videos
      - name: Install transcription tools
        run: |
          pip install --quiet openai-whisper yt-dlp
          bun add -d @anthropic-ai/sdk

      - name: Generate posts for new videos
        id: generate_posts
        run: |
          cd app/brookebrodack-site
          set +e
          bun scripts/generate-posts.ts
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 255 ]; then
            echo "generate-posts failed fatally"
            exit 1
          fi
          echo "Generated $exit_code new post(s)"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push new posts
        if: steps.generate_posts.outputs.exit_code != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/brookebrodack-site/post/content/ app/brookebrodack-site/post/index.ts app/brookebrodack-site/public/transcripts/
          git commit -m "feat: auto-generate blog posts for new YouTube videos"
          git push

      # Build browser + server bundles
      - name: Build
        run: bun run build
        env:
          NODE_ENV: production
          ASSET_BASE_URL: https://brookebrodack.net
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_CHANNELID: ${{ secrets.YOUTUBE_CHANNELID }}
          YOUTUBE_RSS_URL: ${{ secrets.YOUTUBE_RSS_URL }}

      # Copy assets with content-hashed filenames into static output
      - name: Hash-copy assets
        run: bash app/-brookebrodack-dev-bin/bin/assets--hash-copy.sh public/assets app/brookebrodack-site/dist/browser

      # Pre-render all routes to static HTML
      - name: Static export
        run: |
          cd app/brookebrodack-site
          bun ./start.ts &
          sleep 5
          bun ./static-export.ts
          kill %1
        env:
          NODE_ENV: production
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          YOUTUBE_CHANNELID: ${{ secrets.YOUTUBE_CHANNELID }}
          YOUTUBE_RSS_URL: ${{ secrets.YOUTUBE_RSS_URL }}


      # Verify the static export produced expected files
      - name: Verify build output
        run: |
          echo "Checking dist/browser/ for expected HTML files..."
          expected_files=(
            "index.html"
            "brookers/index.html"
            "content/index.html"
            "site/index.html"
            "store/index.html"
            "robots.txt"
            "rss/index.html"
            "sitemap.xml"
          )
          missing=0
          for f in "${expected_files[@]}"; do
            if [ ! -f "app/brookebrodack-site/dist/browser/$f" ]; then
              echo "MISSING: dist/browser/$f"
              missing=1
            else
              echo "OK: dist/browser/$f"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "Build verification failed — missing expected files"
            exit 1
          fi
          echo "Build verification passed"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/brookebrodack-site/dist/browser --project-name=brookebrodack

      # Post-deploy smoke test — verify live site returns 200
      - name: Smoke test live site
        run: |
          echo "Waiting 15s for deployment to propagate..."
          sleep 15
          routes=("/" "/brookers" "/content" "/site" "/store" "/robots.txt" "/rss" "/sitemap.xml")
          failed=0
          for route in "${routes[@]}"; do
            status=$(curl -sL -o /dev/null -w "%{http_code}" "https://brookebrodack.net${route}")
            if [ "$status" -eq 200 ]; then
              echo "OK ($status): ${route}"
            else
              echo "FAIL ($status): ${route}"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "Smoke test failed — one or more routes did not return 200"
            exit 1
          fi
          # Asset smoke test
          status=$(curl -sfL -o /dev/null -w "%{http_code}" "https://assets.brookebrodack.net/images/brooke-brodack-logo.jpg")
          if [ "$status" != "200" ]; then
            echo "FAIL ($status): asset image check"
            failed=1
          else
            echo "OK ($status): https://assets.brookebrodack.net/images/brooke-brodack-logo.jpg"
          fi
          if [ "$failed" -eq 1 ]; then
            echo "Smoke test failed"
            exit 1
          fi
          echo "Smoke test passed"
